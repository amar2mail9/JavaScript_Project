<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-950">
    <div class="flex items-center justify-center w-full h-screen flex-col">
      <h1 class="text-slate-50 text-3xl">Calculator</h1>
      <div
        class="flex items-center justify-center flex-col w-[300px] bg-slate-950 p-3 rounded-md shadow-md shadow-black"
      >
        <div class="w-full">
          <input
            id="display"
            type="text"
            class="px-4 py-2 border border-slate-500 rounded-md text-blue-400 outline-none bg-slate-800 w-full"
            readonly
          />
          <span id="error" class="text-rose-600 text-md hidden"></span>
        </div>
        <div class="py-3 grid grid-cols-4 gap-4 items-center justify-center">
          <button
            class="w-12 h-12 bg-gray-700 text-2xl p-1 rounded-full text-white hover:scale-95 shadow shadow-green-500"
            onclick="handleONClick('1') "
          >
            1
          </button>
          <button
            class="w-12 h-12 bg-gray-700 text-2xl p-1 rounded-full text-white hover:scale-95 shadow shadow-green-500"
            onclick="handleONClick('2') "
          >
            2
          </button>
          <button
            class="w-12 h-12 bg-gray-700 text-2xl p-1 rounded-full text-white hover:scale-95 shadow shadow-green-500"
            onclick="handleONClick('3') "
          >
            3
          </button>
          <button
            class="w-12 h-12 bg-gray-700 text-2xl p-1 rounded-full text-white hover:scale-95 shadow shadow-green-500"
            onclick="handleONClick('+') "
          >
            +
          </button>
          <button
            class="w-12 h-12 bg-gray-700 text-2xl p-1 rounded-full text-white hover:scale-95 shadow shadow-green-500"
            onclick="handleONClick('4') "
          >
            4
          </button>
          <button
            class="w-12 h-12 bg-gray-700 text-2xl p-1 rounded-full text-white hover:scale-95 shadow shadow-green-500"
            onclick="handleONClick('5') "
          >
            5
          </button>
          <button
            class="w-12 h-12 bg-gray-700 text-2xl p-1 rounded-full text-white hover:scale-95 shadow shadow-green-500"
            onclick="handleONClick('6') "
          >
            6
          </button>
          <button
            class="w-12 h-12 bg-gray-700 text-2xl p-1 rounded-full text-white hover:scale-95 shadow shadow-green-500"
            onclick="handleONClick('-') "
          >
            -
          </button>
          <button
            class="w-12 h-12 bg-gray-700 text-2xl p-1 rounded-full text-white hover:scale-95 shadow shadow-green-500"
            onclick="handleONClick('7') "
          >
            7
          </button>
          <button
            class="w-12 h-12 bg-gray-700 text-2xl p-1 rounded-full text-white hover:scale-95 shadow shadow-green-500"
            onclick="handleONClick('8') "
          >
            8
          </button>
          <button
            class="w-12 h-12 bg-gray-700 text-2xl p-1 rounded-full text-white hover:scale-95 shadow shadow-green-500"
            onclick="handleONClick('9') "
          >
            9
          </button>
          <button
            class="w-12 h-12 bg-gray-700 text-2xl p-1 rounded-full text-white hover:scale-95 shadow shadow-green-500"
            onclick="handleONClick('*') "
          >
            x
          </button>
          <button
            class="w-12 h-12 bg-gray-700 text-2xl p-1 rounded-full text-white hover:scale-95 shadow shadow-green-500"
            onclick="handleONClick('0') "
          >
            0
          </button>
          <button
            class="w-12 h-12 bg-gray-700 text-2xl p-1 rounded-full text-white hover:scale-95 shadow shadow-green-500"
            onclick="handleONClick('00') "
          >
            00
          </button>
          <button
            class="w-12 h-12 bg-gray-700 text-2xl p-1 rounded-full text-white hover:scale-95 shadow shadow-green-500"
            onclick="handleONClick('.') "
          >
            .
          </button>
          <button
            class="w-12 h-12 bg-gray-700 text-2xl p-1 rounded-full text-white hover:scale-95 shadow shadow-green-500"
            onclick="handleONClick('/') "
          >
            /
          </button>
          <button
            class="w-12 h-12 bg-gray-700 text-2xl p-1 rounded-full text-white hover:scale-95 shadow shadow-green-500"
            onclick="handleONClick('AC') "
          >
            AC
          </button>
          <button
            class="w-12 h-12 bg-gray-700 text-2xl p-1 rounded-full text-white hover:scale-95 shadow shadow-green-500"
            onclick="handleONClick('DE') "
          >
            DE
          </button>

          <button
            class="w-12 h-12 bg-gray-700 text-2xl p-1 rounded-full text-white hover:scale-95 shadow shadow-green-500"
            onclick="handleONClick('%') "
          >
            %
          </button>
          <button
            class="w-12 h-12 bg-gray-700 text-2xl p-1 rounded-full text-white hover:scale-95 shadow shadow-green-500"
            onclick="handleONClick('=') "
          >
            =
          </button>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
  <script></script>
</html>
