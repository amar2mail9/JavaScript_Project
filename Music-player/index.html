<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <style>
      .custom-gradient {
        background: linear-gradient(30deg, #4f46e5 30%, #f43f5e 100%);
      }
    </style>
  </head>
  <body
    class="flex items-center justify-center text-white w-full h-screen custom-gradient"
  >
    <div
      class="w-[400px] mx-auto h-[500px ] flex justify-center bg-transparent rounded-md shadow-md shadow-black flex-col backdrop-blur-md"
    >
      <div
        class="relative top-0 flex flex-col justify-center items-center bg-blur"
      >
        <img src="./img/a1.gif" alt="" class="opacity-0" id="spectrum" />
        <img src="./img/5.webp" alt="" class="rounded-full w-1/2 absolute" />
        <input
          type="file"
          name=""
          id="inputAudio"
          class="absolute top-0 w-full right-0 h-full opacity-0"
          accept="video/*"
          multiple
        />
      </div>
      <div class="w-full flex flex-col items-center px-4">
        <marquee
          ><h1 id="songName" class="text-xl text-slate-400">
            Your song Name
          </h1></marquee
        >
        <p id="size" class="text-sm text-slate-200 font-semibold">Size:</p>
        <div class="flex w-full items-center gap-4" id="progress-info">
          <div>
            <span id="current-min">00</span><span>:</span
            ><span id="current-sec">00</span>
          </div>
          <div
            id="progress"
            class="flex-grow h-[1vh] bg-indigo-200 rounded-full"
          >
            <div
              id="progress-bar"
              class="w-[0] bg-indigo-800 h-[1vh] rounded-full"
            ></div>
          </div>
          <div>
            <span id="full-min">00</span><span>:</span
            ><span id="full-sec">00</span>
          </div>
        </div>
      </div>
      <div id="controls" class="flex items-center justify-center p-5 gap-3">
        <button
          disabled="true"
          id="mute-btn"
          class="w-8 h-8 text-md bg-indigo-200 text-indigo-800 hover:bg-indigo-800 hover:text-indigo-200 rounded-full flex items-center justify-center toolBar"
        >
          <i class="ri-volume-up-fill" id="mute-icon"></i>
        </button>
        <button
          disabled="true"
          id="back-btn"
          class="w-10 h-10 text-xl bg-indigo-200 text-indigo-800 hover:bg-indigo-800 hover:text-indigo-200 rounded-full flex items-center justify-center toolBar"
        >
          <i class="ri-skip-back-fill"></i>
        </button>
        <button
          disabled="true"
          id="play-btn"
          class="w-16 h-16 text-4xl bg-indigo-200 text-indigo-800 hover:bg-indigo-800 hover:text-indigo-200 rounded-full flex items-center justify-center toolBar"
        >
          <i class="ri-play-large-fill" id="play-icon"></i>
        </button>
        <button
          disabled="true"
          id="forward-btn"
          class="w-10 h-10 text-xl bg-indigo-200 text-indigo-800 hover:bg-indigo-800 hover:text-indigo-200 rounded-full flex items-center justify-center toolBar"
        >
          <i class="ri-skip-forward-fill"></i>
        </button>
        <button
          disabled="true"
          id="loop-btn"
          class="w-8 h-8 text-md bg-indigo-200 text-indigo-800 hover:bg-indigo-800 hover:text-indigo-200 rounded-full flex items-center justify-center toolBar"
        >
          <i class="ri-repeat-2-line" id="loop-icon"></i>
        </button>
      </div>
      <div class="flex flex-grow px-6 py-2 mx-auto">
        <input
          type="range"
          class="px-3"
          min="0"
          max="1"
          step="0.1"
          id="volumeBtn"
        />
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
